global:
  scrape_interval: 45s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'spring-boot-app'
    metrics_path: '/manage/prometheus'
    scrape_interval: 45s
    static_configs:
      - targets: ['app:8367']

  - job_name: 'node-exporter'
    scrape_interval: 45s
    static_configs:
      - targets: ['node_exporter:9100']
