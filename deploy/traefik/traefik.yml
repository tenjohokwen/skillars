global:
  checkNewVersion: false
  sendAnonymousUsage: false

log:
  level: ERROR

ping: {}  # required for healthcheck CMD: traefik healthcheck --ping

api:
  insecure: false
  dashboard: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      # email is injected via CLI arg in docker-compose.yml (traefik.yml does not interpolate env vars)
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web

providers:
  docker:
    exposedByDefault: false
    network: skillars-internal  # must match the network name in docker-compose.yml
