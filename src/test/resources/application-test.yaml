logging:
  config: classpath:logback-test.xml

platform:
  video:
    deletion:
      outbox_initial_delay_ms: 31536000000  # 1 year — prevents background firing in tests
  messaging:
    sse-timeout-ms: 8000  # 8 s — lets the async context close before JVM shutdown in tests
    moderation:
      gemini:
        prompt-template: "Test: evaluate content. Reply SAFE, UNSAFE, or UNCERTAIN.\n\nMessage:\n"
        max-input-chars: 100

app:
  payment:
    stripe:
      api-key: test_key
      webhook-secret: whsec_test
      oauth-client-id: ca_test
      oauth-callback-url: /api/payment/coaches/me/stripe/callback
      callback-success-url: /coach/payment-settings
      fee-rate: "0.025"
      fee-fixed: "0.25"
      base-url: ${wiremock.server.stripe-service.baseUrl:https://api.stripe.com}
  video:
    upload:
      expiry-scheduler-delay-ms: 3600000
    playback:
      signing-secret: "dGVzdC1wbGF5YmFjay1zaWduaW5nLXNlY3JldC0zMi1ieXRlcyEh"  # Base64("test-playback-signing-secret-32-bytes!!")
    bunny:
      api-key: "test-api-key"
      library-id: "123456"
      cdn-hostname: ${wiremock.server.bunny-service.baseUrl:http://localhost}
      api-base-url: ${wiremock.server.bunny-service.baseUrl}
      webhook-signing-secret: "test-webhook-signing-secret"
    moderation:
      sla-monitor-delay-ms: 3600000

features:
  toggles:
    arachnid-enabled: false
    videointel-enabled: false

infrastructure:
  arachnid:
    api-key: "test-arachnid-key"
    api-base-url: ${wiremock.server.bunny-service.baseUrl:http://localhost}
    timeout-seconds: 5
  gemini:
    api-key: "test-gemini-key"
    api-base-url: "${wiremock.server.baseUrl:http://localhost:9999}"
    model: gemini-test
    timeout-seconds: 5
  videointel:
    project-id: "test-project"
    credentials-path: ""
    flag-threshold: 0.7
    timeout-seconds: 5

management:
  tracing:
    enabled: false
  otlp:
    tracing:
      export:
        enabled: false
  metrics:
    export:
      prometheus:
        enabled: false
