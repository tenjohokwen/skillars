<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{email.otp.title}">Verification Code</title>
</head>
<body>
    <p th:text="#{email.greeting(${recipient.firstname})}">Hello User,</p>

    <p th:text="#{email.otp.intro}">Your verification code is:</p>

    <h2 style="font-size: 32px; letter-spacing: 8px; text-align: center;" th:text="${map.otpCode}">123456</h2>

    <p th:text="#{email.otp.expiry}">This code will expire in 10 minutes.</p>

    <p th:text="#{email.otp.ignore}">If you did not request this code, please ignore this email and ensure your account is secure.</p>

    <hr/>
    <p><small><span th:text="#{email.common.helpCode}">Help Code:</span> <span th:text="${map.helpCode}">CODE</span></small></p>
</body>
</html>
