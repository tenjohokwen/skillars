<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{email.coach.otp.title}">Your Skillars phone verification code</title>
</head>
<body>
    <p th:text="#{email.greeting(${recipient.firstname})}">Hello User,</p>

    <p th:text="#{email.coach.otp.intro}">Your phone verification code is:</p>

    <h2 style="font-size: 32px; letter-spacing: 8px; text-align: center;" th:text="${map.otpCode}">123456</h2>

    <p th:text="#{email.coach.otp.expiry}">This code expires in 10 minutes.</p>

    <p th:text="#{email.coach.otp.ignore}">If you did not request this code, please ignore this email and ensure your account is secure.</p>
</body>
</html>
