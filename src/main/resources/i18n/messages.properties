# Creation duplication e-mail
email.creation_dup.title=Duplicate Account Creation Attempt
email.creation_dup.preheader=Attempt To Create Duplicate Account
email.creation_dup.text1=We got a request for the creation of an account using this address. We hereby inform you that you already have an Skillars account.
email.creation_dup.text2=For security, please check the information below to ensure the account creation request was from you. If you did not attempt creating the account, please contact support.
email.creation_dup.loginText=If this was you and you forgot you already have an account, you can log in at:
email.creation_dup.loginLink=Login to your account
email.creation_dup.forgotText=If you forgot your password, you can reset it here:
email.creation_dup.resetLink=Reset your password
email.creation_dup.ignore=If this was not you, please ignore this email. Your account is secure.

