email.pw_reset.text2=For security, please check the information below to ensure the request was from you. If you did not request this, please contact support.
email.pw_reset.linkText=Reset your password
email.pw_reset.copyPaste=Or copy and paste this link into your browser:
email.pw_reset.ignore=If you did not request a password reset, please ignore this email.

