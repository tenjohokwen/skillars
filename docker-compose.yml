x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    image: ${APP_IMAGE}
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-skillars}?TimeZone=UTC
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - LOKI_URL=http://loki:3100
      - LOKI_ENABLED=true
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://tempo:4318/v1/traces
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8367/manage/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2g
    labels:
      - "traefik.enable=true"
      # Main app router → port 9990
      - "traefik.http.routers.app-main.rule=Host(`${DOMAIN}`) && !Path(`/actuator/health`)"
      - "traefik.http.routers.app-main.entrypoints=websecure"
      - "traefik.http.routers.app-main.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app-main.service=app-main-svc"
      - "traefik.http.services.app-main-svc.loadbalancer.server.port=9990"
      # Health rewrite router → port 8367
      - "traefik.http.routers.app-health.rule=Host(`${DOMAIN}`) && Path(`/actuator/health`)"
      - "traefik.http.routers.app-health.entrypoints=websecure"
      - "traefik.http.routers.app-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app-health.middlewares=health-rewrite"
      - "traefik.http.routers.app-health.service=app-health-svc"
      - "traefik.http.services.app-health-svc.loadbalancer.server.port=8367"
      # Middleware: /actuator/health → /manage/health ($$1 escapes $ from Compose interpolation)
      - "traefik.http.middlewares.health-rewrite.replacepathregex.regex=/actuator/(.*)"
      - "traefik.http.middlewares.health-rewrite.replacepathregex.replacement=/manage/$$1"
    networks:
      - skillars-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      loki:
        condition: service_started
      tempo:
        condition: service_started
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *default-logging

  postgres:
    image: postgres:17-alpine
    volumes:
      - /opt/skillars/data/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-skillars}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}", "-d", "${POSTGRES_DB:-skillars}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536m
    networks:
      - skillars-internal
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
    networks:
      - skillars-internal
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *default-logging

  traefik:
    image: traefik:v3.3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/skillars/traefik/acme.json:/etc/traefik/acme.json
      - ./deploy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256m
    networks:
      - skillars-internal
    stop_grace_period: 30s
    restart: unless-stopped
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v3.4.1
    volumes:
      - ./deploy/lgtm/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/lgtm/alerts.yml:/etc/prometheus/alerts.yml:ro
      - /opt/skillars/data/prometheus:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768m
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    networks:
      - skillars-internal

  loki:
    image: grafana/loki:3.4.2
    volumes:
      - ./deploy/lgtm/loki.yml:/etc/loki/loki.yml:ro
      - /opt/skillars/data/loki:/loki
    command: -config.file=/etc/loki/loki.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768m
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    networks:
      - skillars-internal

  tempo:
    image: grafana/tempo:2.9.0
    volumes:
      - ./deploy/lgtm/tempo.yml:/etc/tempo.yaml:ro
      - /opt/skillars/data/tempo:/var/tempo
    command: -config.file=/etc/tempo.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512m
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    networks:
      - skillars-internal

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set in .env}
      - GF_SERVER_ROOT_URL=https://${MONITORING_DOMAIN:?MONITORING_DOMAIN must be set in .env}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      # SMTP for Grafana alert notifications
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED:-}
      - GF_SMTP_HOST=${GF_SMTP_HOST:-}
      - GF_SMTP_USER=${GF_SMTP_USER:-}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD:-}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS:-}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME:-}
      - GF_SMTP_STARTTLS_POLICY=${GF_SMTP_STARTTLS_POLICY:-}
      # Alert routing targets (used by grafana-alerts.yml contact points via ${...} expansion)
      - GF_ALERT_NOTIFY_EMAIL=${GF_ALERT_NOTIFY_EMAIL:-}
      - GF_SLACK_WEBHOOK_URL=${GF_SLACK_WEBHOOK_URL:-}
    volumes:
      - ./deploy/lgtm/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./deploy/lgtm/grafana-alerts.yml:/etc/grafana/provisioning/alerting/alerts.yml:ro
      - ./deploy/lgtm/grafana-dashboard-config.yml:/etc/grafana/provisioning/dashboards/dashboard.yml:ro
      - ./deploy/lgtm/skillars-dashboard.json:/etc/grafana/provisioning/dashboards/skillars-dashboard.json:ro
      - /opt/skillars/data/grafana:/var/lib/grafana
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${MONITORING_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.routers.grafana.service=grafana-svc"
      - "traefik.http.services.grafana-svc.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      tempo:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 512m
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    networks:
      - skillars-internal

  node_exporter:
    image: prom/node-exporter:v1.9.0
    volumes:
      - /:/host:ro,rslave
    command:
      - --path.rootfs=/host
    pid: host
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64m
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    networks:
      - skillars-internal

networks:
  skillars-internal:
    driver: bridge
    # Do NOT set internal: true — app needs outbound internet for OTLP/email/Bunny.net

volumes:
  redis-data:
